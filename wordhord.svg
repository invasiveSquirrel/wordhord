<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="62" fill="#1e1e2e" stroke="#cba6f7" stroke-width="2"/>
  
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#cba6f7" stroke-width="2" opacity="0.3"/>
  
  <!-- Open book shape -->
  <g transform="translate(64, 64)">
    <!-- Left page -->
    <path d="M -20 -25 L -8 -25 L -8 25 L -20 25 Z" fill="#a6e3a1" opacity="0.9"/>
    
    <!-- Right page -->
    <path d="M 8 -25 L 20 -25 L 20 25 L 8 25 Z" fill="#89dceb" opacity="0.9"/>
    
    <!-- Spine -->
    <rect x="-2" y="-25" width="4" height="50" fill="#cba6f7"/>
    
    <!-- Text lines on left page -->
    <line x1="-16" y1="-15" x2="-10" y2="-15" stroke="#11111b" stroke-width="1.5" opacity="0.6"/>
    <line x1="-16" y1="-8" x2="-10" y2="-8" stroke="#11111b" stroke-width="1.5" opacity="0.6"/>
    <line x1="-16" y1="-1" x2="-10" y2="-1" stroke="#11111b" stroke-width="1.5" opacity="0.6"/>
    <line x1="-16" y1="6" x2="-10" y2="6" stroke="#11111b" stroke-width="1.5" opacity="0.6"/>
    <line x1="-16" y1="13" x2="-10" y2="13" stroke="#11111b" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Text lines on right page -->
    <line x1="10" y1="-15" x2="16" y2="-15" stroke="#11111b" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="-8" x2="16" y2="-8" stroke="#11111b" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="-1" x2="16" y2="-1" stroke="#11111b" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="6" x2="16" y2="6" stroke="#11111b" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="13" x2="16" y2="13" stroke="#11111b" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Speaker symbol (for audio learning) -->
    <circle cx="0" cy="20" r="3" fill="#fab387" opacity="0.7"/>
    <path d="M -2 22 L -2 24 L 2 24 L 2 22" stroke="#fab387" stroke-width="1.5" fill="none" opacity="0.7"/>
  </g>
</svg>
